<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Soren's daily physio exercise checklist.">
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2a6db5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Physio">
  <title>Soren Physio</title>
</head>
<body>
  <header class="app-header">
    <span class="brand-name">Soren Physio</span>
    <nav class="day-nav">
      <button id="btn-prev" class="nav-btn" aria-label="Previous day">&#8249;</button>
      <div class="day-label">
        <span id="day-label-main">Today</span>
        <span id="day-label-sub"></span>
      </div>
      <button id="btn-next" class="nav-btn" aria-label="Next day" disabled>&#8250;</button>
    </nav>
  </header>

  <main id="main"></main>

  <footer class="app-footer">
    <span id="version">v0.1.0</span>
  </footer>

  <script src="https://unpkg.com/dexie@4.4.2/dist/dexie.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
